name: Release for MacOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        run: |
          git submodule update --init --recursive

      - name: Prepare Flutter Dependencies
        run: |
          .flutter/bin/flutter config --no-analytics
          .flutter/bin/flutter pub get

      - name: Build for macOS
        run: |
          .flutter/bin/flutter build macos --release

      - name: Create DMG
        run: |
          # Extract app name from the build output
          APP_NAME="watermeter"
          APP_PATH="build/macos/Build/Products/Release/${APP_NAME}.app"
          DMG_NAME="watermeter-macos-release.dmg"
          DMG_PATH="build/app/${DMG_NAME}"
          STAGING_DIR="build/dmg_staging"

          # Verify the app exists
          if [ ! -d "${APP_PATH}" ]; then
            echo "Error: ${APP_PATH} not found!"
            exit 1
          fi

          # Create staging directory
          mkdir -p "${STAGING_DIR}"
          cp -r "${APP_PATH}" "${STAGING_DIR}/"

          # Create a symlink to /Applications for drag-and-drop install
          ln -s /Applications "${STAGING_DIR}/Applications"

          # Create DMG using hdiutil
          mkdir -p build/app
          hdiutil create -volname "${APP_NAME}" \
            -srcfolder "${STAGING_DIR}" \
            -ov -format UDZO \
            "${DMG_PATH}"

          # Cleanup staging directory
          rm -rf "${STAGING_DIR}"

          echo "DMG created at: ${DMG_PATH}"
          ls -lh "${DMG_PATH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Watermeter_macOS
          path: build/app/watermeter-macos-release.dmg

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/watermeter-macos-release.dmg
          prerelease: false
          tag_name: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}
